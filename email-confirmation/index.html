<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email Confirmation - SmartHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-b" aria-hidden="true"></div>
  <div class="bg-shape bg-shape-c" aria-hidden="true"></div>

  <main class="stage">
    <section class="panel reveal-up">
      <header class="nav-bar">
        <a class="logo" href="../">Smart<span>Hub</span> Portal</a>
      </header>

      <section class="hero-grid" style="grid-template-columns:1fr; margin-top: 16px;">
        <article class="hero-copy reveal-up delay-1">
          <p class="status" style="margin-top:0;">Account flow completed</p>

          <h1>Account <span>Verified</span></h1>
          <h2>your email was confirmed successfully</h2>

          <p>
            Return to the SmartHub Windows app and continue signing in using your account.
            This route is kept for authentication redirects only.
          </p>

          <div class="cta-row">
            <a class="btn primary" href="../">Back to Website</a>
          </div>
        </article>
      </section>

      <footer class="foot">
        <p>Email confirmation endpoint is active and working.</p>
      </footer>
    </section>
  </main>
</body>
</html>
